<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Académico</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 40px;
}

button {
    padding: 8px 15px;
    margin: 5px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.seccion {
    display: none;
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 8px;
}
</style>

</head>
<body>

<h1>====== SISTEMA ACADÉMICO ======</h1>

<button onclick="mostrarSeccion('docente')">1. Crear Docente</button>
<button onclick="mostrarSeccion('curso')">2. Crear Curso</button>
<button onclick="mostrarSeccion('horario')">3. Crear Horario</button>
<button onclick="mostrarSeccion('evaluacion')">4. Crear Evaluación</button>
<button onclick="mostrarSeccion('verEvaluaciones')">5. Ver Evaluaciones</button>
<button onclick="mostrarSeccion('verHorarios')">6. Ver Horarios</button>
<button onclick="mostrarSeccion('eliminar')">8. Eliminar</button>

<!-- DOCENTE -->
<div id="docente" class="seccion">
<h2>Crear Docente</h2>
<form id="formDocente">
DNI: <input type="text" id="dni" required><br><br>
Nombre: <input type="text" id="nombre" required><br><br>
Correo: <input type="email" id="correo" required><br><br>
Especialidad: <input type="text" id="especialidad" required><br><br>
<button type="submit">Registrar</button>
</form>
</div>

<!-- CURSO -->
<div id="curso" class="seccion">
<h2>Crear Curso</h2>
<form id="formCurso">
ID: <input type="number" id="idCurso" required><br><br>
Nombre: <input type="text" id="nombreCurso" required><br><br>
Créditos: <input type="number" id="creditos" required><br><br>
<button type="submit">Registrar</button>
</form>
</div>

<!-- HORARIO -->
<div id="horario" class="seccion">
<h2>Crear Horario</h2>
<form id="formHorario">
ID: <input type="number" id="idHorario" required><br><br>
Día: <input type="text" id="dia" required><br><br>
Inicio: <input type="text" id="inicio" required><br><br>
Fin: <input type="text" id="fin" required><br><br>
Aula: <input type="text" id="aula" required><br><br>
<button type="submit">Registrar</button>
</form>
</div>

<!-- EVALUACION -->
<div id="evaluacion" class="seccion">
<h2>Crear Evaluación</h2>
<form id="formEvaluacion">
Título: <input type="text" id="titulo" required><br><br>
Fecha: <input type="date" id="fecha" required><br><br>
<button type="submit">Registrar</button>
</form>
</div>

<!-- VER EVALUACIONES -->
<div id="verEvaluaciones" class="seccion">
<h2>Lista Evaluaciones</h2>
<div id="listaEvaluaciones"></div>
</div>

<!-- VER HORARIOS -->
<div id="verHorarios" class="seccion">
<h2>Lista Horarios</h2>
<div id="listaHorarios"></div>
</div>

<!-- ELIMINAR -->
<div id="eliminar" class="seccion">
<h2>Eliminar Evaluación</h2>
ID: <input type="number" id="idEliminar">
<button onclick="eliminarEvaluacion()">Eliminar</button>
</div>

<script src="app.js"></script>

</body>
</html>
